<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A. Ferrara - Terminal</title>
    <link href="font-awesome/css/font-awesome.min.css" rel="stylesheet" type="text/css">
    <link href="css/terminal.css" rel="stylesheet" type="text/css">
</head>
<body>
    <canvas id="matrix-canvas"></canvas>

    <div id="window-container">
        <div id="title-bar">
            <div class="window-controls">
                <div class="control-dot close"></div>
                <div class="control-dot minimize"></div>
                <div class="control-dot maximize"></div>
            </div>
            <div class="title-text">visitor@aferrara: ~</div>
            <div style="width: 50px;"></div> <!-- Spacer -->
        </div>
        
        <div id="menu-bar">
            <div class="menu-item" onclick="toggleDropdown('file-dropdown')">File</div>
            <!-- Additional menus could go here -->
            <div id="file-dropdown" class="menu-dropdown">
                <div class="dropdown-item" onclick="handleMenuClick('resume')"><i class="fa fa-file-pdf-o"></i> Resume</div>
                <div class="dropdown-item" onclick="handleMenuClick('linkedin')"><i class="fa fa-linkedin-square"></i> LinkedIn</div>
                <div class="dropdown-item" onclick="handleMenuClick('sandbox')"><i class="fa fa-flask"></i> Sandbox</div>
                <div class="dropdown-item" onclick="handleMenuClick('narrative')"><i class="fa fa-book"></i> Career Narrative</div>
                <div class="dropdown-item" onclick="handleMenuClick('help')"><i class="fa fa-question-circle"></i> Help</div>
            </div>
        </div>

        <div id="terminal" onclick="focusInput()">
            <div class="output">Welcome to A. Ferrara's interactive terminal v2.2</div>
            <div class="output">Type <span style="color:var(--cmd-success); font-weight:bold;">help</span> to see available commands or use the File menu.</div>
            <div class="output"><br></div>
        </div>
    </div>

    <script src="js/terminal.js"></script>
</body>
</html>
